services:
  api:
    build:
      context: ./backend
    container_name: meuspoliticos-api
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  sync-worker:
    build:
      context: ./backend
    container_name: meuspoliticos-sync-worker
    command: ["python", "-m", "app.scheduler"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: meuspoliticos-db
    environment:
      POSTGRES_DB: meuspoliticos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: meuspoliticos-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
